      institution: Mendel University in Brno, Faculty of Business and Economics

  keywords:
    - MNIST
    - neural networks
    - CNN
    - ResNet
    - normalization
    - classification
    - PyTorch

  parts:
    abstract: >
      Five neural network architectures — from a single linear layer to a residual 
      network — are trained across five input normalization strategies on MNIST, 
      yielding 25 controlled runs under identical hyperparameters. Models are 
      built in PyTorch using Adam with cosine annealing and evaluated on accuracy, 
      F1, MCC, and inference speed.

    acknowledgements: >
      Mendel University in Brno, Faculty of Business and Economics.
      All authors contributed equally to the experimental design,
      implementation, and analysis.

    availability: >
      Source code, trained model checkpoints, and per-run metrics are
      available at https://github.com/Nouzl0/ENC-NS-Project. All 25 model–normalization
      combinations are fully reproducible with a single created CLI tool.

  exports:
