  title: MNIST Classification - Architecture and Normalization
  short_title: MNIST Classification
  open_access: false

  authors:
    - name: Nikolas Nosál
      email: xnosal@mendelu.cz
      affiliations:
        - mendelu
    - name: Ondřej Studničný
